services:
  - type: web
    name: celina-job-toolkit
    runtime: python
    repo: https://github.com/TheEmprex/celina-job-toolkit
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
    plan: free
